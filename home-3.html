<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Savat — Exclusive E-Commerce</title>
    <link rel="stylesheet" href="style/home-3.css">
    <!-- Font Awesome Ikonkalari -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- JS Fayli -->
    <script src="script/home-3.js" defer></script>
</head>

<body>
    <!-- HEADER -->
    <header class="navbar">
        <div class="logo">Exclusive</div>
        <nav class="nav-links">
            <a href="#">Home</a>
            <a href="#">Contact</a>
            <a href="#">About</a>
            <a href="#">Sign Up</a>
        </nav>
        <div class="nav-actions">
            <div class="search-box">
                <input type="text" placeholder="What are you looking for?">
                <i class="fa-solid fa-magnifying-glass"></i>
            </div>
            <i class="fa-regular fa-heart icon-btn"></i>
            <i class="fa-solid fa-cart-shopping icon-btn active-cart"></i>
        </div>
    </header>

    <main class="container">
        <!-- BREADCRUMB -->
        <div class="breadcrumb">
            <a href="#">Home</a> / <span>Cart</span>
        </div>

        <!-- CART TABLE SECTION -->
        <section class="cart-section">
            <div class="cart-table-header">
                <div>Product</div>
                <div>Price</div>
                <div>Quantity</div>
                <div>Subtotal</div>
            </div>

            <!-- DINAMIK MAHSULOTLAR JS DAN CHIQADI -->
            <div id="cart-items-container" class="cart-items-container">
                <!-- JS bilan to'ldiriladi -->
            </div>

            <!-- BUTTONS ROW -->
            <div class="cart-actions-row">
                <button class="btn btn-outline" id="return-shop-btn">Return To Shop</button>
                <button class="btn btn-outline" id="update-cart-btn">Update Cart</button>
            </div>

            <!-- BOTTOM SECTION: COUPON & TOTAL -->
            <div class="cart-bottom-section">
                <div class="coupon-box">
                    <input type="text" placeholder="Coupon Code" id="coupon-input">
                    <button class="btn btn-primary" id="apply-coupon-btn">Apply Coupon</button>
                </div>

                <div class="cart-total-card">
                    <h3>Cart Total</h3>
                    <div class="total-row">
                        <span>Subtotal:</span>
                        <span id="subtotal-price">$0.00</span>
                    </div>
                    <hr>
                    <div class="total-row">
                        <span>Shipping:</span>
                        <span>Free</span>
                    </div>
                    <hr>
                    <div class="total-row final-total">
                        <span>Total:</span>
                        <span id="final-total-price">$0.00</span>
                    </div>
                    <button class="btn btn-primary btn-checkout">Proceed to checkout</button>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
